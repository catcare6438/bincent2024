
<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>浪貓不浪中途之家</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --orange: #FF7A2F;
    --orange-light: #FFF0E8;
    --orange-mid: #FFB380;
    --cream: #FFFAF5;
    --brown: #5C3D2E;
    --gray: #888;
    --card-radius: 20px;
    --green: #2E9E6B;
    --green-light: #E8F8F0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--cream); color: var(--brown); min-height: 100vh; }

  /* HEADER */
  .header { background: white; border-bottom: 1px solid #F0E0D0; padding: 0 1.5rem; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; height: 60px; }
  .logo { font-size: 1.2rem; font-weight: 800; color: var(--orange); letter-spacing: -0.5px; }
  .logo span { color: var(--brown); }
  .header-actions { display: flex; gap: 8px; align-items: center; }
  .btn { padding: 7px 14px; border-radius: 999px; font-size: 13px; font-weight: 600; border: none; cursor: pointer; transition: all 0.18s; }
  .btn-orange { background: var(--orange); color: white; }
  .btn-orange:hover { background: #E8681F; }
  .btn-outline { background: transparent; color: var(--orange); border: 1.5px solid var(--orange); }
  .btn-outline:hover { background: var(--orange-light); }
  .btn-sm { padding: 5px 12px; font-size: 12px; }

  /* HERO */
  .hero { background: linear-gradient(135deg, #FFF5EE 0%, #FFE8D6 100%); padding: 2.5rem 1.5rem 2rem; text-align: center; }
  .hero-emoji { font-size: 3rem; margin-bottom: 0.5rem; }
  .hero h1 { font-size: clamp(1.5rem, 5vw, 2.5rem); font-weight: 900; color: var(--brown); line-height: 1.2; }
  .hero h1 span { color: var(--orange); }
  .hero p { color: #8B6B5A; margin-top: 0.5rem; font-size: 0.95rem; }
  .hero-stats { display: flex; gap: 1.5rem; justify-content: center; margin-top: 1.2rem; flex-wrap: wrap; }
  .stat-pill { background: white; border-radius: 999px; padding: 6px 16px; font-size: 13px; font-weight: 600; color: var(--brown); border: 1px solid #F0D8C8; }

  /* SEARCH BAR */
  .search-wrap { padding: 1rem 1.5rem; background: white; border-bottom: 1px solid #F0E0D0; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .search-input { flex: 1; min-width: 140px; padding: 9px 16px; border: 1.5px solid #E8D0C0; border-radius: 999px; font-size: 14px; outline: none; color: var(--brown); background: var(--cream); }
  .search-input:focus { border-color: var(--orange); }
  .filter-select { padding: 9px 14px; border: 1.5px solid #E8D0C0; border-radius: 999px; font-size: 13px; outline: none; color: var(--brown); background: var(--cream); cursor: pointer; }
  .filter-select:focus { border-color: var(--orange); }

  /* TABS */
  .tabs { display: flex; gap: 0; background: white; border-bottom: 2px solid #F0E0D0; overflow-x: auto; padding: 0 1.5rem; }
  .tab { padding: 12px 18px; font-size: 14px; font-weight: 600; color: #BBB; border: none; background: none; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; white-space: nowrap; transition: all 0.15s; }
  .tab.active { color: var(--orange); border-bottom-color: var(--orange); }
  .tab:hover:not(.active) { color: var(--brown); }

  /* CAT GRID */
  .section { padding: 1.5rem; }
  .section-title { font-size: 1.1rem; font-weight: 800; color: var(--brown); margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; }
  .cat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
  @media (min-width: 600px) { .cat-grid { grid-template-columns: repeat(3, 1fr); } }
  @media (min-width: 900px) { .cat-grid { grid-template-columns: repeat(4, 1fr); } }

  /* CAT CARD */
  .cat-card { background: white; border-radius: var(--card-radius); overflow: hidden; cursor: pointer; transition: transform 0.18s, box-shadow 0.18s; border: 1px solid #F0E0D0; position: relative; }
  .cat-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(255,122,47,0.15); }
  .cat-card-img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; background: #F5EDE8; }
  .cat-card-img-placeholder { width: 100%; aspect-ratio: 1; background: linear-gradient(135deg, #FFE8D6, #F5D5C5); display: flex; align-items: center; justify-content: center; font-size: 2.5rem; }
  .cat-card-body { padding: 10px 12px 12px; }
  .cat-card-name { font-size: 15px; font-weight: 800; color: var(--brown); }
  .cat-card-meta { font-size: 12px; color: var(--gray); margin-top: 2px; }
  .cat-card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 7px; }
  .tag { font-size: 11px; padding: 2px 8px; border-radius: 999px; font-weight: 600; }
  .tag-orange { background: var(--orange-light); color: #C05020; }
  .tag-green { background: var(--green-light); color: #1A6B45; }
  .tag-gray { background: #F0EDE8; color: #6B5B50; }
  .badge-adopted { position: absolute; top: 8px; right: 8px; background: var(--green); color: white; border-radius: 999px; padding: 3px 10px; font-size: 11px; font-weight: 700; }
  .badge-waiting { position: absolute; top: 8px; right: 8px; background: var(--orange); color: white; border-radius: 999px; padding: 3px 10px; font-size: 11px; font-weight: 700; }
  .like-row { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; padding-top: 8px; border-top: 1px solid #F5EDE8; }
  .like-btn { background: none; border: none; cursor: pointer; display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--gray); font-weight: 600; padding: 2px; transition: color 0.15s; }
  .like-btn.liked { color: #E84393; }
  .like-btn:hover { color: #E84393; }
  .line-btn { background: #06C755; color: white; border: none; border-radius: 999px; padding: 4px 10px; font-size: 11px; font-weight: 700; cursor: pointer; }

  /* LOADING */
  .loading { text-align: center; padding: 3rem 1rem; color: var(--gray); font-size: 15px; }
  .loading-dots::after { content: ''; animation: dots 1.5s infinite; }
  @keyframes dots { 0%,20%{content:'.'} 40%{content:'..'} 60%,100%{content:'...'} }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; overflow-y: auto; padding: 1rem; align-items: flex-start; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: white; border-radius: 24px; max-width: 520px; width: 100%; margin: auto; overflow: hidden; }
  .modal-img { width: 100%; aspect-ratio: 4/3; object-fit: cover; }
  .modal-img-placeholder { width: 100%; aspect-ratio: 4/3; background: linear-gradient(135deg, #FFE8D6, #F5D5C5); display: flex; align-items: center; justify-content: center; font-size: 5rem; }
  .modal-body { padding: 1.25rem 1.5rem 1.5rem; }
  .modal-name { font-size: 1.5rem; font-weight: 900; color: var(--brown); }
  .modal-close { position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,0.35); color: white; border: none; border-radius: 999px; width: 32px; height: 32px; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10; }
  .modal-header { position: relative; }
  .info-row { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .info-item { background: var(--cream); border: 1px solid #EDE0D5; border-radius: 12px; padding: 6px 12px; font-size: 13px; }
  .info-label { font-size: 11px; color: var(--gray); }
  .info-value { font-weight: 700; color: var(--brown); }
  .modal-desc { margin-top: 12px; font-size: 14px; line-height: 1.7; color: #5C4B40; }
  .modal-actions { display: flex; gap: 10px; margin-top: 16px; }
  .modal-actions .btn { flex: 1; text-align: center; padding: 12px; font-size: 15px; }
  .photos-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-top: 12px; }
  .photos-grid img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 10px; }

  /* NEWS/SHARE TAB */
  .post-card { background: white; border-radius: 16px; border: 1px solid #F0E0D0; overflow: hidden; margin-bottom: 14px; }
  .post-header { display: flex; align-items: center; gap: 10px; padding: 12px 14px; }
  .post-avatar { width: 38px; height: 38px; border-radius: 50%; background: linear-gradient(135deg, #FFB380, #FF7A2F); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; object-fit: cover; }
  .post-info { flex: 1; }
  .post-user { font-weight: 700; font-size: 14px; color: var(--brown); }
  .post-cat { font-size: 12px; color: var(--gray); }
  .post-img { width: 100%; aspect-ratio: 4/3; object-fit: cover; display: block; background: #F5EDE8; }
  .post-content { padding: 10px 14px 14px; }
  .post-text { font-size: 14px; line-height: 1.6; color: #5C4B40; }
  .post-heart-row { display: flex; align-items: center; gap: 16px; margin-top: 10px; }

  /* ADMIN */
  .admin-panel { padding: 1.5rem; }
  .admin-login { max-width: 360px; margin: 2rem auto; text-align: center; }
  .admin-login h2 { font-size: 1.3rem; font-weight: 800; margin-bottom: 1rem; color: var(--brown); }
  .admin-input { width: 100%; padding: 12px 16px; border: 1.5px solid #E8D0C0; border-radius: 12px; font-size: 15px; margin-bottom: 10px; outline: none; color: var(--brown); }
  .admin-input:focus { border-color: var(--orange); }
  .admin-tabs { display: flex; gap: 8px; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .admin-tab { padding: 7px 16px; border-radius: 999px; font-size: 13px; font-weight: 600; border: 1.5px solid #E8D0C0; background: white; color: var(--brown); cursor: pointer; }
  .admin-tab.active { background: var(--orange); border-color: var(--orange); color: white; }
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { background: #FFF0E8; color: #8B5A3A; font-weight: 700; padding: 10px 12px; text-align: left; border-bottom: 1px solid #F0D8C8; }
  td { padding: 10px 12px; border-bottom: 1px solid #F8F0EB; color: var(--brown); vertical-align: middle; }
  tr:hover td { background: #FFFAF5; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
  .dot-waiting { background: var(--orange); }
  .dot-adopted { background: var(--green); }
  .action-btn { padding: 4px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; border: none; cursor: pointer; margin-right: 4px; }
  .action-edit { background: #EEF4FF; color: #3B6FE8; }
  .action-delete { background: #FFEEEE; color: #E84040; }
  .action-toggle { background: var(--green-light); color: #1A6B45; }

  /* MEMBER/NUNU */
  .nunu-profile { max-width: 400px; margin: 0 auto; }
  .nunu-avatar { width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, #FFB380, #FF7A2F); display: flex; align-items: center; justify-content: center; font-size: 2.5rem; margin: 0 auto 1rem; cursor: pointer; overflow: hidden; border: 3px solid var(--orange); }
  .nunu-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .nunu-name { text-align: center; font-size: 1.2rem; font-weight: 800; color: var(--brown); }
  .post-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; margin-top: 1rem; }
  .post-grid-img { aspect-ratio: 1; object-fit: cover; width: 100%; background: #F5EDE8; display: block; cursor: pointer; border-radius: 4px; }

  /* SUCCESS (adopted) */
  .adopted-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  @media (min-width: 600px) { .adopted-grid { grid-template-columns: repeat(4, 1fr); } }
  .adopted-card { background: white; border-radius: 16px; overflow: hidden; border: 1px solid #D8F0E5; position: relative; }
  .adopted-card-img { width: 100%; aspect-ratio: 1; object-fit: cover; filter: brightness(0.92); }
  .adopted-card-body { padding: 8px 10px 10px; }
  .adopted-card-name { font-size: 14px; font-weight: 800; color: var(--brown); }
  .adopted-card-meta { font-size: 11px; color: var(--gray); }
  .badge-home { position: absolute; top: 8px; left: 8px; background: var(--green); color: white; border-radius: 999px; padding: 2px 9px; font-size: 11px; font-weight: 700; }

  /* NOTIFICATION */
  .toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: #2C2C2A; color: white; padding: 10px 20px; border-radius: 999px; font-size: 14px; font-weight: 600; z-index: 9999; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; }

  .empty-state { text-align: center; padding: 3rem 1rem; color: var(--gray); font-size: 15px; }
  .empty-state-icon { font-size: 3rem; margin-bottom: 0.5rem; }
</style>
</head>

<script>
const SUPABASE_URL = 'https://raupmwembebxoxzmdppe.supabase.co';
const SUPABASE_KEY = 'sb_publishable_84WIu59Amgf_k0GVIJZ4Ow_ivEBpZRR';
const LINE_ID = '@151ffkpg';
const ADMIN_PWD = 'chch715715';
const WAITING_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRCdE9UVNcCsau-k6E2wPWR8H8Mh76hMluxKjH8SZQLW2Vp7ZvZQSvDz8lRLhJwq4LLPXu0qaD9aQhR/pub?gid=0&single=true&output=csv';
const ADOPTED_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSzApIyvMpCu12nSWMliqX3xa2_mDqKHtXaK1XtUgaAh0l_KNIMf0mCu7aj6UXzJYEaUa3BgIrCRW3O/pub?output=csv';

let sb, allWaiting=[], allAdopted=[], filteredWaiting=[], currentNunu=null, likesMap={}, likedSet=new Set();

async function initSupabase(){
  try{
    sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  }catch(e){ console.warn('Supabase init failed:', e); }
}

function parseCSV(text){
  const lines = text.trim().split('\n');
  if(lines.length < 2) return [];
  const headers = lines[0].split(',').map(h=>h.trim().replace(/"/g,''));
  return lines.slice(1).map(line=>{
    const vals = []; let cur='', inQ=false;
    for(let c of line){ if(c==='"'){inQ=!inQ;}else if(c===','&&!inQ){vals.push(cur.trim());cur='';}else{cur+=c;} }
    vals.push(cur.trim());
    const obj={};
    headers.forEach((h,i)=>{ obj[h]=vals[i]||''; });
    return obj;
  });
}

async function loadWaiting(){
  try{
    const r = await fetch(WAITING_CSV);
    const text = await r.text();
    allWaiting = parseCSV(text);
    filteredWaiting = [...allWaiting];
    document.getElementById('stat-waiting').textContent = `💛 等家中 ${allWaiting.length} 隻`;
    await loadLikes();
    renderWaiting(filteredWaiting);
  }catch(e){
    document.getElementById('loadingWaiting').textContent = '載入失敗，請稍後再試';
    console.error(e);
  }
}

async function loadAdopted(){
  try{
    const r = await fetch(ADOPTED_CSV);
    const text = await r.text();
    allAdopted = parseCSV(text);
    document.getElementById('stat-adopted').textContent = `🏠 已有家 ${allAdopted.length} 隻`;
    renderAdopted(allAdopted);
  }catch(e){
    document.getElementById('loadingAdopted').textContent = '載入失敗';
  }
}

async function loadLikes(){
  if(!sb) return;
  try{
    const {data} = await sb.from('cat_likes').select('cat_name, count');
    if(data) data.forEach(r=>{ likesMap[r.cat_name]=(r.count||0); });
  }catch(e){}
}

async function sbUpdateLikes(catName){
  if(!sb) return;
  try{
    const {data} = await sb.from('cat_likes').select('id,count').eq('cat_name', catName).single();
    if(data){ await sb.from('cat_likes').update({count: (data.count||0)+1}).eq('id', data.id); }
    else{ await sb.from('cat_likes').insert({cat_name: catName, count: 1}); }
    likesMap[catName] = (likesMap[catName]||0)+1;
  }catch(e){}
}

function getField(obj, ...keys){
  for(let k of keys){ if(obj[k]&&obj[k].trim()) return obj[k].trim(); }
  return '';
}

function renderWaiting(cats){
  document.getElementById('loadingWaiting').style.display='none';
  const grid = document.getElementById('waitingGrid');
  const empty = document.getElementById('emptyWaiting');
  if(!cats.length){ grid.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display='none';
  grid.innerHTML = cats.map(cat=>{
    const name = getField(cat,'名字','name','貓咪名字');
    const gender = getField(cat,'性別','gender');
    const age = getField(cat,'年齡','age','年紀');
    const color = getField(cat,'花色','顏色','color');
    const img = getField(cat,'照片','photo','圖片','image','照片連結');
    const likes = likesMap[name]||0;
    const isLiked = likedSet.has(name);
    const imgEl = img ? `<img class="cat-card-img" src="${img}" alt="${name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="cat-card-img-placeholder" style="display:none">🐱</div>` : `<div class="cat-card-img-placeholder">🐱</div>`;
    return `<div class="cat-card" onclick="openCatModal(${JSON.stringify(name)}, 'waiting')">
      ${imgEl}
      <span class="badge-waiting">等家</span>
      <div class="cat-card-body">
        <div class="cat-card-name">${name||'未命名'}</div>
        <div class="cat-card-meta">${gender||''} ${age||''} ${color?'· '+color:''}</div>
        <div class="cat-card-tags">
          ${gender?`<span class="tag tag-orange">${gender}</span>`:''}
          ${age?`<span class="tag tag-gray">${age}</span>`:''}
          ${color?`<span class="tag tag-gray">${color}</span>`:''}
        </div>
        <div class="like-row">
          <button class="like-btn ${isLiked?'liked':''}" onclick="event.stopPropagation();toggleLike('${name}',this)">
            ${isLiked?'💛':'🤍'} <span class="like-count">${likes}</span> 人關注
          </button>
          <button class="line-btn" onclick="event.stopPropagation();openLine()">LINE詢問</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderAdopted(cats){
  document.getElementById('loadingAdopted').style.display='none';
  const grid = document.getElementById('adoptedGrid');
  grid.innerHTML = cats.map(cat=>{
    const name = getField(cat,'名字','name','貓咪名字');
    const img = getField(cat,'照片','photo','圖片','image','照片連結');
    const date = getField(cat,'領養日期','date','日期');
    const imgEl = img ? `<img class="adopted-card-img" src="${img}" alt="${name}" onerror="this.src='';this.style.background='#F5D5C5';">` : `<div style="aspect-ratio:1;background:linear-gradient(135deg,#D8F0E5,#B8E8D0);display:flex;align-items:center;justify-content:center;font-size:2rem;">🏠</div>`;
    return `<div class="adopted-card">
      <span class="badge-home">🏠 幸福</span>
      ${imgEl}
      <div class="adopted-card-body">
        <div class="adopted-card-name">${name||'小貓咪'}</div>
        ${date?`<div class="adopted-card-meta">領養：${date}</div>`:''}
      </div>
    </div>`;
  }).join('');
}

async function loadNews(){
  document.getElementById('loadingNews').style.display='block';
  if(!sb){ document.getElementById('loadingNews').textContent='近況分享需要連線支援'; return; }
  try{
    const {data} = await sb.from('cat_posts').select('*,cat_members(display_name,avatar_url),cats(name)').order('created_at',{ascending:false}).limit(30);
    document.getElementById('loadingNews').style.display='none';
    const feed = document.getElementById('newsFeed');
    if(!data||!data.length){ feed.innerHTML='<div class="empty-state"><div class="empty-state-icon">📷</div><div>還沒有近況分享</div></div>'; return; }
    feed.innerHTML = data.map(post=>{
      const uname = post.cat_members?.display_name||'貓奴';
      const avatar = post.cat_members?.avatar_url;
      const catName = post.cats?.name||post.cat_name||'';
      const img = post.image_url;
      const avatarEl = avatar ? `<img src="${avatar}" class="post-avatar" style="border-radius:50%;object-fit:cover;" onerror="this.style.display='none'">` : `<div class="post-avatar">${uname[0]||'🐱'}</div>`;
      const postLiked = likedSet.has('post_'+post.id);
      return `<div class="post-card">
        <div class="post-header">
          ${avatarEl}
          <div class="post-info">
            <div class="post-user">${uname}</div>
            <div class="post-cat">${catName?'🐱 '+catName:''}</div>
          </div>
        </div>
        ${img?`<img class="post-img" src="${img}" alt="近況照片" onerror="this.style.display='none'">`:''} 
        <div class="post-content">
          <div class="post-text">${post.content||''}</div>
          <div class="post-heart-row">
            <button class="like-btn ${postLiked?'liked':''}" onclick="togglePostLike(${post.id}, this)">
              ${postLiked?'💛':'🤍'} <span>${post.likes_count||0}</span>
            </button>
            <span style="font-size:12px;color:var(--gray);">${post.created_at?new Date(post.created_at).toLocaleDateString('zh-TW'):''}</span>
          </div>
        </div>
      </div>`;
    }).join('');
  }catch(e){ document.getElementById('loadingNews').textContent='載入失敗'; console.error(e); }
}

function toggleLike(catName, btn){
  if(likedSet.has(catName)){ showToast('你已經關注過這隻貓咪囉 💛'); return; }
  likedSet.add(catName);
  sbUpdateLikes(catName);
  const count = btn.querySelector('.like-count');
  if(count) count.textContent = (parseInt(count.textContent)||0)+1;
  btn.classList.add('liked');
  btn.querySelector('span:first-child') && (btn.innerHTML = btn.innerHTML.replace('🤍','💛'));
  btn.innerHTML = `💛 <span class="like-count">${(likesMap[catName]||0)+1}</span> 人關注`;
  btn.classList.add('liked');
  showToast('已關注！感謝你關心 ' + catName + ' 🐱');
}

async function togglePostLike(postId, btn){
  const key = 'post_'+postId;
  if(likedSet.has(key)){ return; }
  likedSet.add(key);
  btn.classList.add('liked');
  if(sb){ await sb.rpc('increment_post_likes', {post_id: postId}); }
  showToast('💛 感謝你的愛！');
}

function filterCats(){
  const q = document.getElementById('searchInput').value.toLowerCase();
  const g = document.getElementById('genderFilter').value;
  const a = document.getElementById('ageFilter').value;
  filteredWaiting = allWaiting.filter(cat=>{
    const name = getField(cat,'名字','name','貓咪名字').toLowerCase();
    const color = getField(cat,'花色','顏色','color').toLowerCase();
    const gender = getField(cat,'性別','gender');
    const age = getField(cat,'年齡','age','年紀');
    const matchQ = !q || name.includes(q) || color.includes(q);
    const matchG = !g || gender===g;
    const matchA = !a || age===a || age.includes(a);
    return matchQ && matchG && matchA;
  });
  renderWaiting(filteredWaiting);
}

function openCatModal(catName, type){
  const cat = type==='waiting' ? allWaiting.find(c=>getField(c,'名字','name','貓咪名字')===catName) : allAdopted.find(c=>getField(c,'名字','name','貓咪名字')===catName);
  if(!cat) return;
  const name = getField(cat,'名字','name','貓咪名字');
  const gender = getField(cat,'性別','gender');
  const age = getField(cat,'年齡','age','年紀');
  const color = getField(cat,'花色','顏色','color');
  const desc = getField(cat,'介紹','描述','備註','description','remark','note');
  const img = getField(cat,'照片','photo','圖片','image','照片連結');
  const health = getField(cat,'健康','絕育','health');
  const location = getField(cat,'地點','location','中途地點');
  
  document.getElementById('modalImgWrap').innerHTML = img 
    ? `<img class="modal-img" src="${img}" alt="${name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="modal-img-placeholder" style="display:none">🐱</div>`
    : `<div class="modal-img-placeholder">🐱</div>`;
  
  document.getElementById('modalBody').innerHTML = `
    <div class="modal-name">${name}</div>
    <div class="info-row">
      ${gender?`<div class="info-item"><div class="info-label">性別</div><div class="info-value">${gender}</div></div>`:''}
      ${age?`<div class="info-item"><div class="info-label">年齡</div><div class="info-value">${age}</div></div>`:''}
      ${color?`<div class="info-item"><div class="info-label">花色</div><div class="info-value">${color}</div></div>`:''}
      ${health?`<div class="info-item"><div class="info-label">健康</div><div class="info-value">${health}</div></div>`:''}
      ${location?`<div class="info-item"><div class="info-label">地點</div><div class="info-value">${location}</div></div>`:''}
    </div>
    ${desc?`<div class="modal-desc">${desc}</div>`:''}
    <div class="modal-actions">
      <button class="btn btn-orange" onclick="openLine()">💌 LINE 詢問領養</button>
      <button class="btn btn-outline" onclick="closeModal()">關閉</button>
    </div>
  `;
  document.getElementById('catModal').classList.add('open');
}

function closeModal(){ document.getElementById('catModal').classList.remove('open'); }

function switchTab(tab, btn){
  ['waiting','adopted','news'].forEach(t=>{
    document.getElementById('tab-'+t).style.display = t===tab?'block':'none';
  });
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(tab==='adopted' && !allAdopted.length) loadAdopted();
  if(tab==='news') loadNews();
}

function openLine(){ window.open('https://line.me/R/ti/p/'+LINE_ID, '_blank'); }

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

// ADMIN
function showAdminLogin(){
  document.getElementById('adminModal').classList.add('open');
  document.getElementById('adminLoginForm').style.display='block';
  document.getElementById('adminDashboard').style.display='none';
}

function closeAdminModal(){ document.getElementById('adminModal').classList.remove('open'); }

function doAdminLogin(){
  const pwd = document.getElementById('adminPwd').value;
  if(pwd === ADMIN_PWD){
    document.getElementById('adminLoginForm').style.display='none';
    document.getElementById('adminDashboard').style.display='block';
    loadAdminCats();

function adminTab(tab, btn){
  ['Cats','Posts','Members'].forEach(t=>{ document.getElementById('admin'+t).style.display = t.toLowerCase()===tab?'block':'none'; });
  document.querySelectorAll('.admin-tab').forEach(b=>b.classList.remove('active'));

  const tbody = document.getElementById('adminCatBody');

    const name = getField(cat,'名字','name','貓咪名字');

      <td><strong>${name}</strong></td>
      <td>${gender}</td>
      <td>${age}</td>

        <button class="action-btn action-edit" onclick="showToast('編輯功能需連接後端')">編輯</button>
        <button class="action-btn action-toggle" onclick="showToast('狀態已切換')">轉已領養</button>
        <button class="action-btn action-delete" onclick="showToast('刪除需確認')">刪除</button>
      </td>
    </tr>`;

}

async function loadAdminPosts(){
  const tbody = document.getElementById('adminPostBody');
  if(!sb){ tbody.innerHTML='<tr><td colspan="4" style="text-align:center">需連接資料庫</td></tr>'; return; }

    const {data} = await sb.from('cat_posts').select('*').order('created_at',{ascending:false}).limit(20);

    </tr>`).join('') || '<tr><td colspan="4" style="text-align:center;color:var(--gray);">暫無貼文</td></tr>';
  }catch(e){ tbody.innerHTML='<tr><td colspan="4">載入失敗</td></tr>'; }

async function loadAdminMembers(){
  const tbody = document.getElementById('adminMemberBody');
  if(!sb){ tbody.innerHTML='<tr><td colspan="4">需連接資料庫</td></tr>'; return; }

    const {data} = await sb.from('cat_members').select('*').order('created_at',{ascending:false});

      <td>${m.username||''}</td>

      </td>

  }catch(e){ tbody.innerHTML='<tr><td colspan="4">載入失敗</td></tr>'; }
}

async function deletePost(id){
  if(!sb||!confirm('確定刪除？')) return;
  await sb.from('cat_posts').delete().eq('id', id);
  showToast('貼文已刪除');
  loadAdminPosts();
}

function showAddCatForm(){ showToast('新增貓咪功能：請直接在 Google Sheets 新增後重新整理'); }

// NUNU (貓奴)
async function doNunuLogin(){
  const user = document.getElementById('nunuUser').value;
  const pwd = document.getElementById('nunuPwd').value;
  if(!sb){ showToast('需連線到資料庫'); return; }
  try{
    const {data} = await sb.from('cat_members').select('*').eq('username', user).eq('password_hash', pwd).single();
    if(data){
      currentNunu = data;
      document.getElementById('nunuLoginForm').style.display='none';
      document.getElementById('nunuProfile').style.display='block';
      document.getElementById('nunuDisplayName').textContent = data.display_name||user;
      if(data.avatar_url) document.getElementById('nunuAvatarDiv').innerHTML = `<img src="${data.avatar_url}" style="width:100%;height:100%;object-fit:cover;">`;
      loadNunuPosts(data.username);
    } else { showToast('帳號或密碼錯誤'); }
  }catch(e){ showToast('登入失敗，請確認帳號密碼'); }
}

async function loadNunuPosts(username){
  if(!sb) return;
  const {data} = await sb.from('cat_posts').select('*').eq('member_username', username).order('created_at',{ascending:false});
  const grid = document.getElementById('nunuPostGrid');
  if(!data||!data.length){ grid.innerHTML='<div style="grid-column:1/-1;text-align:center;color:var(--gray);padding:1rem;font-size:13px;">還沒有分享</div>'; return; }
  grid.innerHTML = data.map(p=>p.image_url?`<img class="post-grid-img" src="${p.image_url}" alt="">`:``).filter(Boolean).join('');
}

function triggerAvatarUpload(){
  const input = document.createElement('input');
  input.type='file'; input.accept='image/*';
  input.onchange = async(e)=>{
    const file = e.target.files[0];
    if(!file||!sb||!currentNunu) return;
    showToast('上傳中...');
    const ext = file.name.split('.').pop();
    const path = `avatars/${currentNunu.username}.${ext}`;
    const {error} = await sb.storage.from('cat-photos').upload(path, file, {upsert:true});
    if(!error){
      const {data:url} = sb.storage.from('cat-photos').getPublicUrl(path);
      await sb.from('cat_members').update({avatar_url:url.publicUrl}).eq('username',currentNunu.username);
      document.getElementById('nunuAvatarDiv').innerHTML = `<img src="${url.publicUrl}" style="width:100%;height:100%;object-fit:cover;">`;
      showToast('大頭照已更新！');
    } else { showToast('上傳失敗'); }
  };
  input.click();
}

function showUploadPost(){
  if(!currentNunu){ showToast('請先登入'); return; }
  const input = document.createElement('input');
  input.type='file'; input.accept='image/*,video/*';
  input.onchange = async(e)=>{
    const file = e.target.files[0];
    if(!file) return;
    const content = prompt('分享一段話給大家看看！');
    if(content===null) return;
    showToast('上傳中...');
    let imageUrl = null;
    if(sb){
      const path = `posts/${Date.now()}_${file.name}`;
      const {error} = await sb.storage.from('cat-photos').upload(path, file, {upsert:true});
      if(!error){
        const {data} = sb.storage.from('cat-photos').getPublicUrl(path);
        imageUrl = data.publicUrl;
      }
      await sb.from('cat_posts').insert({
        member_username: currentNunu.username,
        cat_name: currentNunu.cat_name||'',
        content, image_url: imageUrl, likes_count: 0
      });
    }
    showToast('分享成功！🎉');
    loadNunuPosts(currentNunu.username);
    loadNews();
  };
  input.click();
}

function showChangePassword(){
  const newPwd = prompt('請輸入新密碼（至少6碼）');
  if(!newPwd||newPwd.length<6){ showToast('密碼太短'); return; }
  if(sb&&currentNunu){
    sb.from('cat_members').update({password_hash: newPwd}).eq('username', currentNunu.username);
    showToast('密碼已更新！');
  }
}
